name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: educontrol_test
          POSTGRES_USER: educontrol
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        working-directory: ./server
        run: |
          pip install alembic
          alembic upgrade head
        env:
          DATABASE_URL: postgresql+psycopg2://educontrol:password@localhost:5432/educontrol_test

      - name: Run tests
        working-directory: ./server
        run: python -m pytest tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://educontrol:password@localhost:5432/educontrol_test
          REDIS_URL: redis://localhost:6379/0
